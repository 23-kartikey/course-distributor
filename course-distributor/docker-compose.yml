version: '3.9'

services:

  postgres:
    image: postgres:17
    container_name: course_distributor_postgres

    restart: always

    environment:
      POSTGRES_DB: course_distributor
      POSTGRES_USER: kartikey
      POSTGRES_PASSWORD: password
      TZ: Asia/Kolkata

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - payment-network
  
volumes:
  postgres_data:

networks:
  payment-network:


